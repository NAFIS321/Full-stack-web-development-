<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prising Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-div"> 
        <div class="table">
            <div class="table-header">Basic </div>
                <div class="table-price">$9.99/month</div>
                    <ul class="item-list">
                         <li>✅ 10GB Storage</li>
                         <li>✅ 1 User</li>
                         <li>🚫 Support</li>
                    </ul>
                    <button class="btn">Sign Up</button>

        </div>
        <div class="table">
            <div class="table-header">Standard</div>
                <div class="table-price">$19.99/month</div>
                    <ul class="item-list">
                         <li>✅ 50GB Storage</li>
                         <li>✅ 5 User</li>
                         <li>✅ phone and email support</li>
                    </ul>
                    <button class="btn">Sign Up</button>
                </div>
                 <div class="table">
            <div class="table-header">premium</div>
                <div class="table-price">$49.99/month</div>
                    <ul class="item-list">
                         <li>✅ 10GB Storage</li>
                         <li>✅ 1 User</li>
                         <li>✅ 24/7 Support</li>
                    </ul>
                    <button class="btn">Sign Up</button>
                </div>

    </div>
    
</body>
</html>
