<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chess-board</title>
    <style>
        
        .container {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 4px solid #333;
            width: 480px;
            height: 480px;
        }
        
            
        
        .black {
            background-color: #769656;
            width: 60px;
            height: 60px;
        }
        .white {
            background-color: #eeeed2;
            width: 60px;
            height: 60px;
        }
    </style>
    
</head>
<body>
     <div class="container"> 
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>


       <div class="black"></div>
        <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>


       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>

         <div class="black"></div>
         <div class="white"></div>
         <div class="black"></div>
        <div class="white"></div>
        <div class="black"></div>
        <div class="white"></div>
        <div class="black"></div>
        <div class="white"></div>

         <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>

        <div class="black"></div>
         <div class="white"></div>
         <div class="black"></div>
        <div class="white"></div>
        <div class="black"></div>
        <div class="white"></div>
        <div class="black"></div>
        <div class="white"></div>

         <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>
       <div class="white"></div>
       <div class="black"></div>

        <div class="black"></div>
         <div class="white"></div>
         <div class="black"></div>
        <div class="white"></div>
        <div class="black"></div>
        <div class="white"></div>
        <div class="black"></div>
        <div class="white"></div>

         







     </div>
        
    
</body>
</html>
